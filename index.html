<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather Finder</title>
  <!-- GitHub Pages viewport fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* GitHub Pages fix - ensure full height */
    #app-container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Dynamic weather background */
    .weather-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      transition: all 1s ease;
    }

    .sunny-bg {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .cloudy-bg {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .rainy-bg {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .night-bg {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }

    /* Animated particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-20px) translateX(10px); }
      50% { transform: translateY(-10px) translateX(-10px); }
      75% { transform: translateY(-30px) translateX(5px); }
    }

    .main-container {
      max-width: 1200px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
      animation: slideIn 0.8s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Search Panel */
    .search-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 35px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      height: fit-content;
    }

    .app-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .app-title {
      font-size: 2.5em;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .app-subtitle {
      color: #666;
      font-size: 1em;
      opacity: 0.8;
    }

    .search-box {
      position: relative;
      margin-bottom: 25px;
    }

    .search-input {
      width: 100%;
      padding: 18px 50px 18px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      font-size: 1.1em;
      outline: none;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .search-input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      font-size: 1.2em;
    }

    .search-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    /* Quick Cities */
    .quick-cities {
      margin-top: 30px;
    }

    .quick-cities-title {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .city-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .city-chip {
      padding: 8px 16px;
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 20px;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #333;
    }

    .city-chip:hover {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
      transform: translateY(-2px);
    }

    /* Weather Display */
    .weather-display {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .weather-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .location-name {
      font-size: 2.2em;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .location-country {
      font-size: 1.2em;
      color: #666;
      opacity: 0.8;
    }

    .current-time {
      font-size: 1em;
      color: #888;
      margin-top: 10px;
    }

    .weather-main {
      display: flex;
      align-items: center;
      justify-content: space-around;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .temp-section {
      text-align: center;
    }

    .temperature {
      font-size: 4.5em;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .feels-like {
      font-size: 1.1em;
      color: #666;
      margin-top: 5px;
    }

    .weather-icon-section {
      text-align: center;
    }

    .weather-icon-large {
      width: 150px;
      height: 150px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .weather-condition {
      font-size: 1.4em;
      font-weight: 600;
      color: #333;
      text-transform: capitalize;
      margin-top: 15px;
    }

    /* Weather Details Grid */
    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .detail-card {
      background: rgba(102, 126, 234, 0.05);
      border: 1px solid rgba(102, 126, 234, 0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .detail-card:hover {
      background: rgba(102, 126, 234, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
    }

    .detail-icon {
      font-size: 2em;
      color: #667eea;
      margin-bottom: 10px;
    }

    .detail-label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 1.4em;
      font-weight: 700;
      color: #333;
    }

    /* 5-Day Forecast */
    .forecast-section {
      margin-top: 40px;
    }

    .forecast-title {
      font-size: 1.3em;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    .forecast-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
    }

    .forecast-day {
      background: rgba(102, 126, 234, 0.05);
      border: 1px solid rgba(102, 126, 234, 0.1);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .forecast-day:hover {
      background: rgba(102, 126, 234, 0.1);
      transform: translateY(-3px);
    }

    .forecast-date {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .forecast-icon {
      width: 50px;
      height: 50px;
      margin: 0 auto 10px;
    }

    .forecast-temps {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 0.9em;
    }

    .forecast-high {
      color: #e74c3c;
      font-weight: 600;
    }

    .forecast-low {
      color: #3498db;
      font-weight: 600;
    }

    /* Loading and Error States */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      display: none;
      animation: shake 0.5s ease-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* Responsive Design */
    @media (max-width: 968px) {
      .main-container {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .weather-main {
        flex-direction: column;
        gap: 30px;
      }

      .temperature {
        font-size: 3.5em;
      }
    }

    @media (max-width: 600px) {
      #app-container {
        padding: 10px;
      }

      .search-panel, .weather-display {
        padding: 25px;
      }

      .app-title {
        font-size: 2em;
      }

      .temperature {
        font-size: 3em;
      }

      .weather-details {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .forecast-container {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 400px) {
      .weather-details {
        grid-template-columns: 1fr;
      }

      .forecast-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="weather-bg" id="weatherBg">
    <div class="particles" id="particles"></div>
  </div>

  <div id="app-container">
    <!-- Search Panel -->
    <div class="search-panel">
      <div class="app-header">
        <h1 class="app-title">Weather Finder</h1>
        <p class="app-subtitle">check the weather of any place you want</p>
      </div>

      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          id="searchInput" 
          placeholder="Search for any city..."
          autocomplete="off"
        >
        <i class="fas fa-search search-icon"></i>
      </div>

      <button class="search-btn" onclick="searchWeather()">
        <i class="fas fa-search"></i> Search Weather
      </button>

      <div class="quick-cities">
        <div class="quick-cities-title">Quick Cities</div>
        <div class="city-chips" id="cityChips">
          <!-- Cities will be inserted here by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Weather Display -->
    <div class="weather-display" id="weatherDisplay" style="display: none;">
      <div class="weather-header">
        <div class="location-name" id="locationName">--</div>
        <div class="location-country" id="locationCountry">--</div>
        <div class="current-time" id="currentTime">--</div>
      </div>

      <div class="weather-main">
        <div class="temp-section">
          <div class="temperature" id="temperature">--°</div>
          <div class="feels-like" id="feelsLike">Feels like --°</div>
        </div>

        <div class="weather-icon-section">
          <img class="weather-icon-large" id="weatherIcon" src="" alt="Weather icon">
          <div class="weather-condition" id="weatherCondition">--</div>
        </div>
      </div>

      <div class="weather-details">
        <div class="detail-card">
          <i class="fas fa-tint detail-icon"></i>
          <div class="detail-label">Humidity</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>

        <div class="detail-card">
          <i class="fas fa-wind detail-icon"></i>
          <div class="detail-label">Wind Speed</div>
          <div class="detail-value" id="windSpeed">-- m/s</div>
        </div>

        <div class="detail-card">
          <i class="fas fa-compress-arrows-alt detail-icon"></i>
          <div class="detail-label">Pressure</div>
          <div class="detail-value" id="pressure">-- hPa</div>
        </div>

        <div class="detail-card">
          <i class="fas fa-eye detail-icon"></i>
          <div class="detail-label">Visibility</div>
          <div class="detail-value" id="visibility">-- km</div>
        </div>

        <div class="detail-card">
          <i class="fas fa-sun detail-icon"></i>
          <div class="detail-label">UV Index</div>
          <div class="detail-value" id="uvIndex">--</div>
        </div>
      </div>

      <div class="forecast-section">
        <div class="forecast-title">5-Day Forecast</div>
        <div class="forecast-container" id="forecastContainer">
          <!-- Forecast cards will be inserted here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    const API_KEY = '6d203096eceff2ddbd456fc03ffca1c4';
    let currentWeatherData = null;

    // All possible cities for random selection
    const allCities = [
      { name: 'London', country: 'UK' },
      { name: 'New York', country: 'USA' },
      { name: 'Tokyo', country: 'Japan' },
      { name: 'Paris', country: 'France' },
      { name: 'Sydney', country: 'Australia' },
      { name: 'Dubai', country: 'UAE' },
      { name: 'Singapore', country: 'Singapore' },
      { name: 'Mumbai', country: 'India' },
      { name: 'Beijing', country: 'China' },
      { name: 'Moscow', country: 'Russia' },
      { name: 'Cairo', country: 'Egypt' },
      { name: 'Rio de Janeiro', country: 'Brazil' },
      { name: 'Toronto', country: 'Canada' },
      { name: 'Berlin', country: 'Germany' },
      { name: 'Rome', country: 'Italy' },
      { name: 'Madrid', country: 'Spain' },
      { name: 'Bangkok', country: 'Thailand' },
      { name: 'Seoul', country: 'South Korea' },
      { name: 'Mexico City', country: 'Mexico' },
      { name: 'Lagos', country: 'Nigeria' },
      { name: 'Istanbul', country: 'Turkey' },
      { name: 'Jakarta', country: 'Indonesia' }
    ];

    // Generate random cities on page load
    function generateRandomCities() {
      const cityChips = document.getElementById('cityChips');
      cityChips.innerHTML = '';
      
      // Shuffle array and take 6 random cities
      const shuffled = [...allCities].sort(() => 0.5 - Math.random());
      const selectedCities = shuffled.slice(0, 6);
      
      selectedCities.forEach(city => {
        const chip = document.createElement('div');
        chip.className = 'city-chip';
        chip.textContent = city.name;
        chip.onclick = () => quickSearch(city.name);
        cityChips.appendChild(chip);
      });
    }

    // Initialize particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      particlesContainer.innerHTML = '';
      
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 6 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Update background based on weather
    function updateBackground(weather) {
      const bg = document.getElementById('weatherBg');
      const condition = weather.weather[0].main.toLowerCase();
      
      bg.className = 'weather-bg';
      
      if (condition.includes('clear') || condition.includes('sun')) {
        bg.classList.add('sunny-bg');
      } else if (condition.includes('cloud')) {
        bg.classList.add('cloudy-bg');
      } else if (condition.includes('rain') || condition.includes('storm')) {
        bg.classList.add('rainy-bg');
      } else if (condition.includes('night') || condition.includes('mist')) {
        bg.classList.add('night-bg');
      }
    }

    // Search weather
    async function searchWeather() {
      const input = document.getElementById('searchInput').value.trim();
      if (!input) {
        showError('Please enter a city name');
        return;
      }

      showLoading();
      try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(input)}&appid=${API_KEY}&units=metric`);
        
        if (!response.ok) {
          showError('City not found. Please try again.');
          return;
        }

        const data = await response.json();
        currentWeatherData = data;
        
        // Get forecast
        const forecastResponse = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(input)}&appid=${API_KEY}&units=metric`);
        const forecastData = await forecastResponse.json();
        
        displayWeather(data);
        displayForecast(forecastData);
        updateBackground(data);
        createParticles();
        
      } catch (error) {
        showError('Failed to fetch weather data. Please try again.');
      }
    }

    // Quick search for preset cities
    function quickSearch(city) {
      document.getElementById('searchInput').value = city;
      searchWeather();
    }

    // Display current weather
    function displayWeather(data) {
      hideLoading();
      document.getElementById('weatherDisplay').style.display = 'block';
      
      document.getElementById('locationName').textContent = data.name;
      document.getElementById('locationCountry').textContent = data.sys.country;
      
      // Update current time
      const now = new Date();
      document.getElementById('currentTime').textContent = now.toLocaleString('en-US', {
        weekday: 'long',
        hour: '2-digit',
        minute: '2-digit'
      });
      
      document.getElementById('temperature').textContent = Math.round(data.main.temp) + '°';
      document.getElementById('feelsLike').textContent = `Feels like ${Math.round(data.main.feels_like)}°`;
      document.getElementById('weatherCondition').textContent = data.weather[0].description;
      document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;
      
      document.getElementById('humidity').textContent = data.main.humidity + '%';
      document.getElementById('windSpeed').textContent = data.wind.speed + ' m/s';
      document.getElementById('pressure').textContent = data.main.pressure + ' hPa';
      document.getElementById('visibility').textContent = (data.visibility / 1000).toFixed(1) + ' km';
      document.getElementById('uvIndex').textContent = data.uvi || '--';
    }

    // Display 5-day forecast
    function displayForecast(forecastData) {
      const container = document.getElementById('forecastContainer');
      container.innerHTML = '';
      
      // Get one forecast per day (every 8 forecasts = 24 hours)
      const dailyForecasts = forecastData.list.filter((_, index) => index % 8 === 0).slice(0, 5);
      
      dailyForecasts.forEach((forecast, index) => {
        const date = new Date(forecast.dt * 1000);
        const temp = forecast.main.temp;
        const minTemp = forecast.main.temp_min;
        const maxTemp = forecast.main.temp_max;
        const icon = forecast.weather[0].icon;
        
        const forecastCard = document.createElement('div');
        forecastCard.className = 'forecast-day';
        forecastCard.innerHTML = `
          <div class="forecast-date">${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
          <img class="forecast-icon" src="https://openweathermap.org/img/wn/${icon}@2x.png" alt="Weather">
          <div class="forecast-temps">
            <span class="forecast-high">${Math.round(maxTemp)}°</span>
            <span class="forecast-low">${Math.round(minTemp)}°</span>
          </div>
        `;
        
        container.appendChild(forecastCard);
      });
    }

    // Loading states
    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('weatherDisplay').style.display = 'none';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function showError(message) {
      hideLoading();
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      errorDiv.style.position = 'fixed';
      errorDiv.style.top = '20px';
      errorDiv.style.left = '50%';
      errorDiv.style.transform = 'translateX(-50%)';
      errorDiv.style.zIndex = '1001';
      
      document.body.appendChild(errorDiv);
      
      setTimeout(() => {
        errorDiv.remove();
      }, 5000);
    }

    // Handle Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchWeather();
      }
    });

    // Initialize on load
    window.addEventListener('load', () => {
      generateRandomCities();
      createParticles();
    });
  </script>
</body>
</html>
